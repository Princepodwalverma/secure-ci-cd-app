name: Secure CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------
      # Setup Node
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      # -------------------------
      # SonarCloud SAST
      # -------------------------
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # -------------------------
      # Trivy Filesystem Scan
      # -------------------------
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: 1

      # -------------------------
      # Docker Build
      # -------------------------
      - name: Build Docker Image
        run: |
          docker build --no-cache -t secure-app:latest .

      # -------------------------
      # Trivy Image Scan
      # -------------------------
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: secure-app:latest
          format: table
          severity: CRITICAL
          exit-code: 1

      - name: Success Message
        run: echo "Secure pipeline passed 🚀"

      # push to dockerhub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}
      -  name: Tag Docker Image
         run: docker tag secure-app:latest ${{ secrets.DOCKER_USERNAME }}/secure-ci-cd-app:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/secure-ci-cd-app:latest
        #deploy on ec2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/secure-ci-cd-app:latest
            docker stop secure-app || true
            docker rm secure-app || true
            docker run -d -p 4000:4000 --name secure-app ${{ secrets.DOCKER_USERNAME }}/secure-ci-cd-app:latest